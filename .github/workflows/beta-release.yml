name: Create Plugin Beta Release

on:
    push:
        branches:
            - 'feature/**'
            - 'feature-*'
            - 'feat/**'
            - 'feat-*'
            - 'fix/**'
            - 'fix-*'
            - 'bug/**'
            - 'bug-*'
            - 'bugfix/**'
            - 'bugfix-*'
            - 'hotfix/**'
            - 'hotfix-*'
            - 'chore/**'
            - 'chore-*'
            - 'deps/**'
            - 'deps-*'
            - 'docs/**'
            - 'docs-*'
            - 'refactor/**'
            - 'refactor-*'
            - 'perf/**'
            - 'perf-*'
            - 'test/**'
            - 'test-*'
            - 'tests/**'
            - 'tests-*'
            - 'ci/**'
            - 'ci-*'
            - 'build/**'
            - 'build-*'
            - 'style/**'
            - 'style-*'

env:
    PLUGIN_NAME: advanced-code-block

jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: write
            id-token: write
            attestations: write

        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Compute beta SemVer
              id: beta-version
              run: |
                  git fetch --tags --force
                  node <<'NODE'
                  const { execSync } = require("node:child_process");

                  const packageJson = require("./package.json");
                  const baseMatch = String(packageJson.version).match(/^(\d+)\.(\d+)\.(\d+)/);
                  if (!baseMatch) {
                    throw new Error(`Package version is not SemVer: ${packageJson.version}`);
                  }
                  const [, baseMajor, baseMinor, basePatch] = baseMatch;
                  const baseVersion = `${baseMajor}.${baseMinor}.${basePatch}`;

                  const tags = execSync("git tag --list", { encoding: "utf8" })
                    .split(/\r?\n/)
                    .map((tag) => tag.trim())
                    .filter(Boolean);

                  const betaTags = tags
                    .map((tag) => {
                      const match = tag.match(/^v?(\d+)\.(\d+)\.(\d+)-beta\.(\d+)$/);
                      if (!match) return null;
                      const [, major, minor, patch, beta] = match;
                      return {
                        tag,
                        major: Number(major),
                        minor: Number(minor),
                        patch: Number(patch),
                        beta: Number(beta),
                      };
                    })
                    .filter(Boolean)
                    .filter((tag) => tag.major === Number(baseMajor) && tag.minor === Number(baseMinor) && tag.patch === Number(basePatch))
                    .sort((a, b) => {
                      return b.beta - a.beta;
                    });

                  const latest = betaTags[0] ?? null;
                  const next = `${baseVersion}-beta.${latest ? latest.beta + 1 : 1}`;
                  console.log(`Base version: ${baseVersion}`);
                  console.log(`Latest beta tag: ${latest?.tag ?? "(none)"}`);
                  console.log(`Next beta tag: ${next}`);
                  require("node:fs").appendFileSync(process.env.GITHUB_OUTPUT, `new_tag=${next}\n`);
                  NODE

            - name: Apply beta version to plugin manifests
              env:
                  BETA_VERSION: ${{ steps.beta-version.outputs.new_tag }}
              run: |
                  node -e '
                  const fs = require("node:fs");
                  const version = process.env.BETA_VERSION;
                      if (!version) throw new Error("Missing beta version from Compute beta SemVer step");
                  for (const file of ["package.json", "manifest.json", "manifest-beta.json"]) {
                    const data = JSON.parse(fs.readFileSync(file, "utf8"));
                    data.version = version;
                    fs.writeFileSync(file, `${JSON.stringify(data, null, "\t")}\n`);
                  }
                  const manifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
                  const versions = JSON.parse(fs.readFileSync("versions.json", "utf8"));
                  versions[version] = manifest.minAppVersion;
                  fs.writeFileSync("versions.json", `${JSON.stringify(versions, null, "\t")}\n`);
                  '

            - name: Build
              id: build
              run: |
                  bun install
                  bun run build
                  mkdir ${{ env.PLUGIN_NAME }}
                  cp -r dist/* ${{ env.PLUGIN_NAME }}
                  zip -r ${{ env.PLUGIN_NAME }}-${{ steps.beta-version.outputs.new_tag }}.zip ${{ env.PLUGIN_NAME }}
                  ls

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      dist/*.js
                      dist/manifest.json
                      dist/*.css
                      ${{ env.PLUGIN_NAME }}-${{ steps.beta-version.outputs.new_tag }}.zip

            - name: Release
              id: release
              uses: softprops/action-gh-release@v3
              with:
                  prerelease: true
                  tag_name: ${{ steps.beta-version.outputs.new_tag }}
                  name: Beta ${{ steps.beta-version.outputs.new_tag }}
                  target_commitish: ${{ github.ref_name }}
                  token: ${{ secrets.GITHUB_TOKEN }}
                  files: |
                      ${{ env.PLUGIN_NAME }}-${{ steps.beta-version.outputs.new_tag }}.zip
                      dist/*.js
                      dist/manifest.json
                      dist/*.css
